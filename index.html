<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Micuadre - POS Offline v3.7</title>
    <!-- ICONO DEL SISTEMA (FAVICON) -->
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23ec4899'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white' font-family='sans-serif' font-weight='bold'%3EM%3C/text%3E%3C/svg%3E">
    <!-- LIBRERÍA PARA PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- LIBRERÍA PARA GRÁFICOS (Chart.js) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- ESTILOS CSS (DISEÑO) - VERSIÓN COMPACTA --- */
        :root {
            --color-dark: #0f172a;        /* Slate 900 */
            --color-dark-light: #1e293b; /* Slate 800 */
            --color-bg: #f1f5f9;         /* Slate 100 */
            --color-white: #ffffff;
            --color-accent: #ec4899;     /* Pink 500 */
            --color-accent-hover: #db2777;
            --color-text-main: #334155;
            --color-text-muted: #64748b;
            --color-danger: #ef4444;
            --color-success: #22c55e;
            --color-warning: #f59e0b;
            --color-wholesale: #d97706;  /* Amber 600 for Wholesale */
            --color-border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --radius: 8px; /* Reduced radius for compact look */
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { background-color: var(--color-bg); color: var(--color-text-main); height: 100vh; display: flex; overflow: hidden; font-size: 14px; } /* Base font size reduced */

        /* Iconos simples con SVG */
        .icon { width: 18px; height: 18px; vertical-align: middle; stroke: currentColor; stroke-width: 2; fill: none; }
        
        /* Layout Principal */
        aside { width: 180px; background-color: var(--color-dark); color: white; display: flex; flex-direction: column; flex-shrink: 0; transition: margin-left 0.3s; position: relative; z-index: 50; overflow: visible; }
        aside.collapsed { margin-left: -180px; }

        /* Contenedor interno para el scroll del sidebar */
        .sidebar-inner {
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            width: 100%;
        }

        .sidebar-toggle {
            position: absolute;
            right: -24px; 
            top: 50%;     
            transform: translateY(-50%);
            width: 24px;
            height: 50px;
            background-color: var(--color-dark);
            color: white;
            border-radius: 0 8px 8px 0; 
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: none;
            box-shadow: 2px 0 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s;
        }
        .sidebar-toggle:hover {
            background-color: var(--color-accent);
        }

        aside .brand { padding: 15px; border-bottom: 1px solid var(--color-dark-light); display: flex; align-items: center; gap: 8px; }
        aside .brand .logo { width: 32px; height: 32px; background-color: var(--color-accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1rem; }
        
        nav { padding: 15px 8px; display: flex; flex-direction: column; gap: 4px; }
        nav button { background: none; border: none; color: #94a3b8; width: 100%; padding: 8px 10px; text-align: left; cursor: pointer; border-radius: var(--radius); display: flex; align-items: center; gap: 8px; font-size: 0.85rem; transition: all 0.2s; }
        nav button:hover { background-color: var(--color-dark-light); color: white; }
        nav button.active { background-color: var(--color-accent); color: white; box-shadow: 0 4px 12px rgba(236, 72, 153, 0.3); }

        main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        header { height: 50px; background: var(--color-white); border-bottom: 1px solid var(--color-border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; }
        header h2 { font-size: 1.1rem; font-weight: 700; color: var(--color-dark); }
        .search-bar { position: relative; width: 240px; }
        .search-bar input { width: 100%; padding: 6px 12px 6px 32px; border-radius: 20px; border: none; background: var(--color-bg); outline: none; transition: box-shadow 0.2s; font-size: 0.9rem; }
        .search-bar input:focus { box-shadow: 0 0 0 2px var(--color-accent); background: white; }
        .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--color-text-muted); }

        .user-info { display: flex; align-items: center; gap: 8px; font-size: 0.8rem; }
        .user-badge { background: var(--color-bg); padding: 4px 10px; border-radius: 20px; font-weight: 600; color: var(--color-text-main); border: 1px solid var(--color-border); }
        .point-badge { background: var(--color-dark); color: white; padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; }

        #app-content { flex: 1; overflow: auto; padding: 16px; display: flex; flex-direction: column; }

        /* Vistas y Componentes */
        .hidden { display: none !important; }
        .btn { padding: 6px 12px; border-radius: 6px; border: none; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: opacity 0.2s; font-size: 0.9rem; }
        .btn:hover { opacity: 0.9; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-primary { background: var(--color-accent); color: white; }
        .btn-danger { background: var(--color-danger); color: white; }
        .btn-dark { background: var(--color-dark); color: white; }
        .btn-warning { background: var(--color-wholesale); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--color-border); color: var(--color-text-main); }
        .btn-sm { padding: 3px 6px; font-size: 0.75rem; }

        /* Login View */
        .login-container { display: flex; align-items: center; justify-content: center; height: 100%; width: 100%; background: var(--color-bg); }
        .login-box { background: white; padding: 30px; border-radius: 16px; box-shadow: var(--shadow); width: 100%; max-width: 360px; text-align: center; border: 1px solid var(--color-border); }
        .login-logo { width: 50px; height: 50px; background: var(--color-accent); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; font-weight: bold; margin: 0 auto 15px; }

        /* Lock Screen */
        .lock-screen { position: fixed; inset: 0; background: var(--color-dark); color: white; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; }
        .lock-icon { width: 60px; height: 60px; color: var(--color-danger); margin-bottom: 15px; }
        .lock-id-box { background: rgba(255,255,255,0.1); padding: 8px 16px; border-radius: 6px; font-family: monospace; font-size: 1.2rem; letter-spacing: 2px; border: 1px dashed rgba(255,255,255,0.3); margin: 8px 0; user-select: text; color: #4ade80; font-weight: bold; }
        .lock-info-label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-top: 12px;}

        /* License Status Widget in Sidebar */
        .license-status { background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px; margin-bottom: 8px; font-size: 0.75rem; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .days-left { font-size: 1rem; font-weight: bold; display: block; margin-top: 2px; }
        .status-ok { color: #4ade80; }
        .status-warn { color: #facc15; }
        .status-danger { color: #f87171; }

        /* POS View */
        .category-filter { display: flex; gap: 8px; margin-bottom: 4px; overflow-x: auto; padding-bottom: 4px; flex-shrink: 0; }
        .cat-chip { padding: 5px 10px; border-radius: 16px; background: white; border: 1px solid var(--color-border); font-size: 0.8rem; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all 0.2s; }
        .cat-chip:hover { background: var(--color-bg); }
        .cat-chip.active { background: var(--color-dark); color: white; border-color: var(--color-dark); }
        
        .cat-chip.wholesale-mode.active { background: var(--color-wholesale); border-color: var(--color-wholesale); }

        .pos-container { display: flex; gap: 8px; height: 100%; overflow: hidden; }
        
        .products-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; align-content: start; overflow-y: auto; padding-right: 4px; }
        
        .product-card { background: white; border-radius: var(--radius); padding: 8px; border: 1px solid var(--color-border); cursor: pointer; transition: transform 0.1s, box-shadow 0.1s; display: flex; flex-direction: column; height: 125px; position: relative; }
        .product-card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--color-accent); }
        .wholesale-mode .product-card:hover { border-color: var(--color-wholesale); }
        
        .product-icon { width: 28px; height: 28px; background: #fdf2f8; color: var(--color-accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-bottom: 4px; font-size: 0.8rem; }
        .wholesale-mode .product-icon { background: #fffbeb; color: var(--color-wholesale); }
        
        .product-name-card {
            font-weight: bold;
            margin-bottom: 4px;
            line-height: 1.1;
            font-size: 0.85rem;
            display: -webkit-box;
            -webkit-line-clamp: 2; 
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .product-info { margin-top: auto; display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
        .product-price { color: var(--color-accent); font-weight: bold; font-size: 0.9rem; white-space: nowrap; }
        .wholesale-mode .product-price { color: var(--color-wholesale); }
        .product-stock { font-size: 0.7rem; color: var(--color-text-muted); }
        
        .qty-btn-card { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; background: var(--color-bg); border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; color: var(--color-text-muted); transition: all 0.2s; }
        .qty-btn-card:hover { background: var(--color-dark); color: white; }

        .cart-sidebar { width: 250px; background: white; border-radius: var(--radius); border: 1px solid var(--color-border); display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow); height: 85%; }
        .cart-header { padding: 8px 10px; background: #f8fafc; border-bottom: 1px solid var(--color-border); display: flex; justify-content: space-between; align-items: center; font-weight: bold; font-size: 0.9rem; flex-shrink: 0; }
        .wholesale-mode .cart-header { background: #fffbeb; border-bottom-color: #fde68a; color: #b45309; }
        .cart-items { flex: 1; overflow-y: auto; padding: 6px; display: flex; flex-direction: column; gap: 6px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: #f8fafc; padding: 4px 6px; border-radius: 6px; }
        .wholesale-mode .cart-item { background: #fffbeb; }
        .cart-controls { display: flex; align-items: center; gap: 4px; background: white; padding: 1px; border-radius: 4px; border: 1px solid var(--color-border); margin: 0 4px; }
        .cart-controls button { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; cursor: pointer; color: var(--color-text-main); font-size: 0.85rem; }
        .cart-controls button:hover { background: #f1f5f9; border-radius: 4px; }
        .cart-qty-display { font-weight: bold; font-size: 0.8rem; width: 18px; text-align: center; cursor: pointer; border-bottom: 1px dashed #cbd5e1; }
        .cart-qty-display:hover { background: #f1f5f9; }
        .cart-footer { padding: 8px 10px; background: var(--color-dark); color: white; margin-top: auto; flex-shrink: 0; }

        /* Tablas */
        .table-container { background: white; border-radius: var(--radius); border: 1px solid var(--color-border); overflow: hidden; flex: 1; display: flex; flex-direction: column; }
        .table-scroll { overflow: auto; flex: 1; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #f8fafc; font-size: 0.7rem; text-transform: uppercase; color: var(--color-text-muted); font-weight: 600; position: sticky; top: 0; z-index: 10; border-bottom: 2px solid var(--color-border); }
        td { padding: 8px 12px; border-bottom: 1px solid #f1f5f9; font-size: 0.85rem; }
        tr:hover { background: #f8fafc; }
        
        .row-danger td { background-color: #fef2f2; color: #b91c1c; }
        .row-danger:hover td { background-color: #fee2e2; }
        .row-danger td .btn-outline { border-color: #b91c1c; color: #b91c1c; }

        /* Modales */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(2px); display: flex; align-items: center; justify-content: center; z-index: 100; }
        .modal { background: white; width: 100%; max-width: 400px; border-radius: 16px; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); animation: zoomIn 0.2s ease-out; display: flex; flex-direction: column; max-height: 90vh; }
        .modal-header { background: var(--color-dark); color: white; padding: 16px; text-align: center; flex-shrink: 0; }
        .modal-body { padding: 20px; overflow-y: auto; }
        @keyframes zoomIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .input-group { margin-bottom: 12px; text-align: left; }
        .input-group label { display: block; font-size: 0.75rem; font-weight: bold; color: var(--color-text-muted); margin-bottom: 4px; }
        .input-field { width: 100%; padding: 8px 10px; border: 2px solid var(--color-border); border-radius: 6px; font-size: 0.9rem; outline: none; transition: border-color 0.2s; background: white; }
        .input-field:focus { border-color: var(--color-accent); }
        select.input-field { appearance: none; background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e"); background-repeat: no-repeat; background-position: right 0.8rem center; background-size: 1em; }
        
        .change-box { background: #ecfdf5; border: 1px solid #a7f3d0; padding: 12px; border-radius: 10px; margin-bottom: 16px; }
        .change-box.negative { background: #fef2f2; border-color: #fecaca; }
        .bill-tag { display: inline-flex; align-items: center; gap: 4px; background: white; border: 1px solid #bbf7d0; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; color: #166534; margin: 2px; font-weight: bold; }

        .pay-tabs { display: flex; background: var(--color-bg); padding: 4px; border-radius: 8px; margin-bottom: 16px; }
        .pay-tab { flex: 1; padding: 8px; text-align: center; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; color: var(--color-text-muted); border: 2px solid transparent; }
        .pay-tab.active { background: white; color: var(--color-dark); shadow: var(--shadow); border-color: var(--color-accent); }
        .pay-tab.wholesale.active { border-color: var(--color-wholesale); }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 16px; border-radius: var(--radius); border: 1px solid var(--color-border); }
        .stat-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 10px; }
        .stat-value { font-size: 1.5rem; font-weight: bold; color: var(--color-dark); }
        .stat-label { color: var(--color-text-muted); font-weight: 500; font-size: 0.85rem; }

        .arqueo-box { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
        .arqueo-result { font-weight: bold; font-size: 1rem; padding: 8px; border-radius: 6px; margin-top: 8px; display: flex; justify-content: space-between; }
        .arqueo-ok { background: #dcfce7; color: #166534; }
        .arqueo-warn { background: #fef2f2; color: #b91c1c; }
        .arqueo-surplus { background: #dbeafe; color: #1e40af; }

        .badge { padding: 3px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .badge-sale { background: #ecfdf5; color: #059669; }
        .badge-wholesale { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }
        .badge-entry { background: #dbeafe; color: #1e40af; }
        .badge-loss { background: #fef2f2; color: #b91c1c; }
        .badge-transfer { background: #f3e8ff; color: #7e22ce; border: 1px solid #d8b4fe; }
        .badge-admin { background: #475569; color: white; }
        .badge-worker { background: #e2e8f0; color: #475569; }
        .badge-point { background: #0f172a; color: white; border-radius: 12px; padding: 2px 8px; font-size: 0.7rem; }
        .badge-withdrawal { background: #fff1f2; color: #e11d48; border: 1px solid #fecdd3; } 
        .badge-expense { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

        .counter-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
        .counter-card { background: white; border: 1px solid var(--color-border); border-radius: var(--radius); padding: 12px; text-align: center; transition: all 0.2s; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        .counter-card:focus-within { border-color: var(--color-accent); box-shadow: var(--shadow); transform: translateY(-4px); }
        .counter-card.active-count { border-color: var(--color-success); background-color: #f0fdf4; }
        .counter-card.active-count .denom-label { color: #166534; }
        .denom-label { font-size: 1.3rem; font-weight: 800; color: var(--color-dark); margin-bottom: 6px; letter-spacing: -1px; }
        .subtotal-display { font-size: 0.8rem; color: var(--color-text-muted); margin-top: 6px; font-weight: 600; min-height: 1.2em; }
        .active-count .subtotal-display { color: #15803d; }

        .charts-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .chart-container { position: relative; height: 300px; width: 100%; }

    </style>
</head>
<body>

    <aside id="sidebar" class="collapsed">
        <button onclick="toggleSidebar()" class="sidebar-toggle" title="Abrir/Cerrar Menú">
            <svg class="icon" style="width:16px; height:16px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>

        <div class="sidebar-inner">
            <div class="brand">
                <div class="logo">M</div>
                <span>Micuadre</span>
            </div>
            <nav>
                <button class="nav-btn active" data-tab="pos" onclick="switchTab('pos')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
                    Caja (Ventas)
                </button>
                
                <!-- NUEVO BOTÓN X MAYOR (MAYORISTA) -->
                <button id="nav-wholesale" class="nav-btn hidden" data-tab="wholesale" onclick="switchTab('wholesale')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
                    x Mayor
                </button>

                <button class="nav-btn" data-tab="inventory" onclick="switchTab('inventory')">
                    <svg class="icon" viewBox="0 0 24 24"><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                    Inventario
                </button>
                <button class="nav-btn" data-tab="transfers" onclick="switchTab('transfers')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M17 1l4 4-4 4"></path><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><path d="M7 23l-4-4 4-4"></path><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
                    Transferencias
                </button>
                <button class="nav-btn" data-tab="expenses" onclick="switchTab('expenses')">
                    <svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>
                    Gastos (Pérdidas)
                </button>
                <button class="nav-btn" data-tab="withdrawals" onclick="switchTab('withdrawals')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
                    Extracciones
                </button>
                <button class="nav-btn" data-tab="counter" onclick="switchTab('counter')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
                    Contador
                </button>
                <button class="nav-btn" data-tab="history" onclick="switchTab('history')">
                    <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                    Historial
                </button>
                
                <button class="nav-btn" data-tab="charts" onclick="switchTab('charts')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M21 21H4.6a.6.6 0 0 1-.6-.6V3"/><rect x="8" y="10" width="4" height="11" rx="1"/><rect x="16" y="6" width="4" height="15" rx="1"/></svg>
                    Gráficos
                </button>

                <button class="nav-btn" data-tab="dashboard" onclick="switchTab('dashboard')">
                    <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Resumen
                </button>
                
                <!-- NUEVO BOTÓN NÓMINA -->
                <button id="nav-payroll" class="nav-btn hidden" data-tab="payroll" onclick="switchTab('payroll')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    Nómina (Pagos)
                </button>

                <button id="nav-reports" class="nav-btn hidden" data-tab="shifts" onclick="switchTab('shifts')">
                   <svg class="icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    Reportes (Cuadres)
                </button>

                <button id="nav-users" class="nav-btn hidden" data-tab="users" onclick="switchTab('users')">
                    <svg class="icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Usuarios
                </button>

                <button id="nav-settings" class="nav-btn hidden" data-tab="settings" onclick="switchTab('settings')">
                    <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Configuración
                </button>
            </nav>
            <div style="padding: 10px; font-size: 0.8rem; text-align: center; margin-top: 20px;">
                <div id="license-widget" class="license-status" style="margin-bottom: 5px;">
                    <div>Licencia</div>
                    <span id="days-left-display" class="days-left">...</span>
                </div>
                <div style="margin-bottom: 5px; opacity:0.7;">Offline POS v3.7</div>
                <button class="btn btn-outline btn-sm" onclick="logout()" style="width:100%; justify-content:center; border-color: #334155; color: #94a3b8;">Cerrar Sesión</button>
            </div>
        </div>
    </aside>

    <main>
        <header id="main-header" class="hidden">
            <div style="display:flex; align-items:center; gap:8px;">
                <button onclick="toggleSidebar()" class="btn btn-outline" style="border:none; padding:4px; color:var(--color-dark); display: none;">
                    <svg class="icon" style="width:24px; height:24px;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <h2 id="page-title" style="margin:0;">Punto de Venta</h2>
            </div>
            
            <div id="search-container" class="search-bar">
                <svg class="icon search-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" placeholder="Buscar producto..." onkeyup="handleSearch(this.value)">
            </div>

            <div class="user-info">
                <div id="point-display" class="point-badge">...</div>
                <div id="user-display" class="user-badge">Invitado</div>
            </div>
        </header>

        <div id="app-content">
            <!-- Vistas -->
        </div>
    </main>

    <div id="modal-container" class="modal-overlay hidden"></div>
    <input type="file" id="import-file" style="display:none" onchange="processImport(this)">

    <script>
        const DENOMINACIONES_CUP = [1000, 500, 200, 100, 50, 20, 10, 5, 3, 1];
        const DEFAULT_CATEGORIES = ['Confituras', 'Bebidas', 'Cárnicos', 'Víveres', 'Aseo', 'Cigarros', 'Otros'];
        // Roles definidos en el sistema
        const ROLES = {
            ADMIN: 'admin',
            WORKER: 'Dependiente', 
            STEVEDORE: 'estibador',
            ACCOUNTANT: 'economico',
            GUARD: 'custodio',
            DISTRIBUTOR: 'distribuidor'
        };

        let state = {
            settings: { 
                pointName: 'Sede Principal',
                enableCheckoutUI: true, 
                wholesaleEnabled: false, 
                sortInventoryBy: 'added',
                salary: { base: 0, bonusThreshold: 1000, bonusAmount: 0 } 
            }, 
            users: [],              
            currentUser: null, 
            inventory: [],
            categories: [], 
            cart: [],
            wholesaleCart: [],
            history: [],
            shifts: [], 
            payroll: [], 
            tempArqueo: { withdrawal: '', realCash: '' },
            searchTerm: '',
            selectedCategory: 'Todas',
            paymentMethod: 'cash',
            filterPoint: 'All', 
            billCounts: {}, 
            license: { expirationDate: null, installId: null, lastRequestCode: null }
        };

        let activePOSMode = 'retail';

        // Helper para mostrar de forma amigable el formato del salario
        function formatSalaryConfig(config) {
            if (config.type === 'fixed') return `$${config.base} Fijo`;
            if (config.type === 'percent') return `${config.percent}% de Ventas`;
            if (config.type === 'mixed') return `$${config.base} + ${config.percent}% de Ventas`;
            if (config.type === 'fixed_action') return `$${config.base} + $${config.actionRate} x ${config.actionName}`;
            return 'No definido';
        }

        function init() {
            const savedInv = localStorage.getItem('primos_inventory');
            const savedHist = localStorage.getItem('primos_history');
            const savedShifts = localStorage.getItem('primos_shifts');
            const savedUsers = localStorage.getItem('primos_users');
            const savedSettings = localStorage.getItem('primos_settings');
            const savedLicense = localStorage.getItem('primos_license');
            const savedCategories = localStorage.getItem('primos_categories');
            const savedTempArqueo = localStorage.getItem('primos_temp_arqueo');
            const savedPayroll = localStorage.getItem('primos_payroll'); 
            
            if (savedInv) state.inventory = JSON.parse(savedInv);
            if (savedHist) state.history = JSON.parse(savedHist);
            if (savedShifts) state.shifts = JSON.parse(savedShifts);
            if (savedUsers) state.users = JSON.parse(savedUsers);
            if (savedSettings) state.settings = { ...state.settings, ...JSON.parse(savedSettings) };
            if (savedPayroll) state.payroll = JSON.parse(savedPayroll);
            
            if (savedCategories) {
                state.categories = JSON.parse(savedCategories);
            } else {
                state.categories = [...DEFAULT_CATEGORIES];
            }

            if (savedTempArqueo) {
                state.tempArqueo = JSON.parse(savedTempArqueo);
            }
            
            if (state.settings.enableCheckoutUI === undefined) {
                state.settings.enableCheckoutUI = true;
            }

            if (state.settings.sortInventoryBy === undefined) {
                state.settings.sortInventoryBy = 'stock_asc';
            }
            
            // Migración de Usuarios
            state.users = state.users.map(u => ({
                ...u,
                role: u.role || 'worker',
                canLogin: u.canLogin !== undefined ? u.canLogin : true,
                salaryConfig: { 
                    type: u.salaryConfig?.type || 'mixed', 
                    base: u.salaryConfig?.base || 0, 
                    percent: u.salaryConfig?.percent || 0,
                    frequency: u.salaryConfig?.frequency || 'daily',
                    actionRate: u.salaryConfig?.actionRate || 0, // NUEVO: Monto por accion
                    actionName: u.salaryConfig?.actionName || 'acciones' // NUEVO: Nombre accion (ej: cajas)
                }
            }));

            if (savedLicense) {
                state.license = JSON.parse(savedLicense);
            } else {
                state.license.installId = generateInstallId();
                const validDate = new Date();
                validDate.setDate(validDate.getDate() + 30);
                state.license.expirationDate = validDate.toISOString();
                saveLicense();
            }
            
            if (state.users.length === 0) {
                state.users.push({ id: 'admin', name: 'Admin', password: 'admin', role: 'admin', canLogin: true });
                saveData();
            }

            state.inventory = state.inventory.map(p => ({
                ...p,
                category: p.category || 'Otros',
                cost: p.cost !== undefined ? p.cost : (p.price * 0.7),
                stock: (p.stock === null || p.stock === undefined || isNaN(p.stock)) ? 0 : Number(p.stock),
                unitsPerBox: p.unitsPerBox || (p.category === 'x Mayor' ? 1 : null)
            }));
            
            if (checkLicenseStatus()) {
                renderLogin();
                updateLicenseDisplay();
            } else {
                renderLockScreen();
            }
            
            updatePointDisplay();
            updateSidebarVisibility();
        }

        function generateInstallId() {
            return Math.random().toString(36).substring(2, 6).toUpperCase() + '-' + 
                   Math.random().toString(36).substring(2, 6).toUpperCase();
        }

        function saveLicense() {
            localStorage.setItem('primos_license', JSON.stringify(state.license));
        }

        function checkLicenseStatus() {
            if (!state.license.expirationDate) return false;

            const now = new Date();
            const expDate = new Date(state.license.expirationDate);

            if (state.license.lastSeenDate) {
                const lastSeen = new Date(state.license.lastSeenDate);
                if (now < lastSeen) {
                     return false;
                }
            }

            state.license.lastSeenDate = now.toISOString();
            saveLicense();

            return now < expDate;
        }

        function updateLicenseDisplay() {
            const expDate = new Date(state.license.expirationDate);
            const now = new Date();
            const diffTime = expDate - now;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
            
            const display = document.getElementById('days-left-display');
            if (!display) return;

            if (diffDays > 10) {
                display.className = 'days-left status-ok';
                display.innerText = `${diffDays} Días`;
            } else if (diffDays > 3) {
                display.className = 'days-left status-warn';
                display.innerText = `${diffDays} Días`;
            } else {
                display.className = 'days-left status-danger';
                display.innerText = `${diffDays} Días`;
            }
        }

        function renderLockScreen() {
            if (!state.license.lastRequestCode) {
                state.license.lastRequestCode = Math.floor(1000 + Math.random() * 9000);
                saveLicense();
            }

            const lockDiv = document.createElement('div');
            lockDiv.id = 'lock-screen-overlay';
            lockDiv.className = 'lock-screen';
            lockDiv.innerHTML = `
                <svg class="icon lock-icon" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                <h2 style="font-size:2rem; margin-bottom:10px;">Licencia Vencida</h2>
                <p style="font-size:1rem; opacity:0.8; max-width:400px; margin-bottom:20px;">
                    Su periodo de 30 días ha finalizado. 
                    Para renovar contacte al: <br>
                    <strong style="font-size:1.2rem; color:#4ade80;">+53 55728794------+53 54893999</strong>
                </p>
                <div class="lock-info-label">ID DE INSTALACIÓN</div>
                <div class="lock-id-box">${state.license.installId}</div>
                <div class="lock-info-label">CÓDIGO DE SOLICITUD</div>
                <div class="lock-id-box" style="color:#facc15; border-color:#facc15;">${state.license.lastRequestCode}</div>
                <p style="font-size:0.85rem; color:#64748b; margin-bottom:20px;">Envíe ambos códigos para recibir su clave.</p>
                <div style="display:flex; gap:10px; max-width:400px; width:100%;">
                    <input id="license-key-input" type="text" class="input-field" placeholder="Ingrese Clave de Renovación" style="text-align:center;">
                    <button onclick="activateLicense()" class="btn btn-primary">Renovar</button>
                </div>
            `;
            document.body.appendChild(lockDiv);
        }

        function activateLicense() {
            const key = document.getElementById('license-key-input').value.trim();
            const secret = "HAROLD_SECURE";
            const dataString = state.license.installId + state.license.lastRequestCode + secret;
            const validKey = btoa(dataString).split('').reverse().join('');

            if (key === validKey) {
                const newExpDate = new Date();
                newExpDate.setDate(newExpDate.getDate() + 30);
                state.license.expirationDate = newExpDate.toISOString();
                state.license.lastRequestCode = null;
                saveLicense();
                alert("¡Renovación Exitosa! Sistema activo por 30 días más.");
                document.getElementById('lock-screen-overlay').remove();
                renderLogin();
                updateLicenseDisplay();
            } else {
                alert("Clave inválida. Verifique los códigos.");
            }
        }

        const modalContainer = document.getElementById('modal-container');
        let currentPayMethod = 'cash';
        let currentCheckoutMode = 'retail';

        function closeModal() {
            modalContainer.classList.add('hidden');
            modalContainer.innerHTML = '';
        }

        function openCheckoutModal(total, mode = 'retail') {
            currentPayMethod = 'cash'; 
            currentCheckoutMode = mode;

            if (state.settings.enableCheckoutUI === false) {
                confirmSale(total);
                return;
            }
            renderCheckoutContent(total);
            modalContainer.classList.remove('hidden');
            setTimeout(() => document.getElementById('pay-input')?.focus(), 100);
        }

        function setPayMethod(method, total) {
            currentPayMethod = method;
            renderCheckoutContent(total);
        }

        function renderCheckoutContent(total) {
            const isWholesale = currentCheckoutMode === 'wholesale';

            modalContainer.innerHTML = `
                <div class="modal">
                    <div class="modal-header" style="${isWholesale ? 'background-color: var(--color-wholesale);' : ''}">
                        <h3>Cobrar ${isWholesale ? '(x Mayor)' : ''}</h3>
                        <div style="font-size:2rem; font-weight:bold;">${formatCurrency(total)}</div>
                    </div>
                    <div class="modal-body">
                        <div class="pay-tabs">
                            <div class="pay-tab ${isWholesale ? 'wholesale' : ''} ${currentPayMethod === 'cash' ? 'active' : ''}" onclick="setPayMethod('cash', ${total})">💵 Efectivo</div>
                            <div class="pay-tab ${isWholesale ? 'wholesale' : ''} ${currentPayMethod === 'transfer' ? 'active' : ''}" onclick="setPayMethod('transfer', ${total})">📱 Transfermóvil</div>
                        </div>
                        ${currentPayMethod === 'cash' ? `
                            <div class="input-group">
                                <label>Efectivo Recibido (CUP)</label>
                                <input type="number" id="pay-input" class="input-field" placeholder="0.00" oninput="calcChange(this.value, ${total})">
                            </div>
                            <div id="change-display" class="change-box negative">
                                <div style="display:flex; justify-content:space-between;">
                                    <strong>Faltante:</strong>
                                    <strong>${formatCurrency(total)}</strong>
                                </div>
                            </div>
                        ` : `
                            <div style="padding: 20px; text-align:center; background:#f0f9ff; border-radius:12px; border:1px solid #bae6fd; margin-bottom:20px;">
                                <p style="color:#0369a1; font-weight:bold;">Pago por Transferencia</p>
                                <p style="font-size:0.9rem; color:#64748b;">Verifique que la transferencia de ${formatCurrency(total)} haya llegado correctamente.</p>
                            </div>
                        `}
                        <div style="display:flex; gap:10px;">
                            <button onclick="closeModal()" class="btn btn-outline" style="flex:1; justify-content:center;">Cancelar</button>
                            <button id="confirm-pay-btn" onclick="confirmSale(${total})" class="btn ${isWholesale ? 'btn-warning' : 'btn-primary'}" style="flex:1; justify-content:center;" ${currentPayMethod === 'cash' ? 'disabled' : ''}>Confirmar Venta</button>
                        </div>
                    </div>
                </div>
            `;
        }

        function calcChange(paidStr, total) {
            const paid = parseFloat(paidStr) || 0;
            const diff = paid - total;
            const display = document.getElementById('change-display');
            const btn = document.getElementById('confirm-pay-btn');

            if (diff >= 0) {
                display.className = 'change-box';
                display.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <strong style="color:var(--color-success); font-size:1.1rem;">Vuelto a entregar:</strong>
                        <strong style="color:var(--color-success); font-size:1.8rem;">${formatCurrency(diff)}</strong>
                    </div>
                `;
                btn.disabled = false;
            } else {
                display.className = 'change-box negative';
                display.innerHTML = `
                      <div style="display:flex; justify-content:space-between;">
                        <strong style="color:var(--color-danger);">Faltante:</strong>
                        <strong style="color:var(--color-danger);">${formatCurrency(Math.abs(diff))}</strong>
                    </div>
                `;
                btn.disabled = true;
            }
        }

        function confirmSale(total) {
            let paid = total;
            let change = 0;

            if (currentPayMethod === 'cash') {
                const inputEl = document.getElementById('pay-input');
                if (inputEl) {
                    paid = parseFloat(inputEl.value) || total;
                } else {
                    paid = total; 
                }
                change = paid - total;
            }

            const activeCart = currentCheckoutMode === 'wholesale' ? state.wholesaleCart : state.cart;
            const saleTypeRecord = currentCheckoutMode === 'wholesale' ? 'sale_wholesale' : 'sale';

            let saleCost = 0;
            activeCart.forEach(item => {
                saleCost += (item.cost || 0) * item.qty;
            });

            const sale = {
                id: generateId(),
                type: saleTypeRecord,
                date: new Date().toISOString(),
                items: [...activeCart],
                total: total,
                totalCost: saleCost,
                profit: total - saleCost,
                paid: paid,
                change: change,
                method: currentPayMethod,
                user: state.currentUser.name,
                point: state.settings.pointName
            };

            state.inventory = state.inventory.map(prod => {
                const inCart = activeCart.find(c => c.id === prod.id);
                if (inCart) return { ...prod, stock: prod.stock - inCart.qty };
                return prod;
            });

            state.history.unshift(sale);
            
            if (currentCheckoutMode === 'wholesale') {
                state.wholesaleCart = [];
            } else {
                state.cart = [];
            }

            saveData();
            closeModal();
            renderPOS();
        }

        function updatePointDisplay() {
            const display = document.getElementById('point-display');
            if(display) display.innerText = state.settings.pointName;
        }

        function updateSidebarVisibility() {
            const navWholesale = document.getElementById('nav-wholesale');
            if (navWholesale) {
                if (state.settings.wholesaleEnabled) {
                    navWholesale.classList.remove('hidden');
                } else {
                    navWholesale.classList.add('hidden');
                }
            }
        }

        function login(username, password) {
            const user = state.users.find(u => u.name === username && u.password === password && u.canLogin !== false);
            if (user) {
                state.currentUser = user;
                document.getElementById('sidebar').classList.remove('collapsed');
                document.getElementById('main-header').classList.remove('hidden');
                document.getElementById('user-display').innerText = `${user.name} (${user.role === 'admin' ? 'A' : 'T'})`;
                
                if (user.role === 'admin') {
                    document.getElementById('nav-reports').classList.remove('hidden');
                    document.getElementById('nav-users').classList.remove('hidden');
                    document.getElementById('nav-settings').classList.remove('hidden');
                    document.getElementById('nav-payroll').classList.remove('hidden');
                } else {
                    document.getElementById('nav-reports').classList.add('hidden');
                    document.getElementById('nav-users').classList.add('hidden');
                    document.getElementById('nav-settings').classList.add('hidden');
                    document.getElementById('nav-payroll').classList.add('hidden');
                }

                updateSidebarVisibility();
                switchTab('pos');
            } else {
                alert("Usuario incorrecto o sin acceso al sistema");
            }
        }

        function logout() {
            state.currentUser = null;
            state.cart = []; 
            state.wholesaleCart = [];
            state.billCounts = {}; 
            document.getElementById('sidebar').classList.add('collapsed');
            document.getElementById('main-header').classList.add('hidden');
            renderLogin();
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        function saveData() {
            localStorage.setItem('primos_inventory', JSON.stringify(state.inventory));
            localStorage.setItem('primos_history', JSON.stringify(state.history));
            localStorage.setItem('primos_shifts', JSON.stringify(state.shifts || []));
            localStorage.setItem('primos_users', JSON.stringify(state.users));
            localStorage.setItem('primos_settings', JSON.stringify(state.settings));
            localStorage.setItem('primos_categories', JSON.stringify(state.categories)); 
            localStorage.setItem('primos_temp_arqueo', JSON.stringify(state.tempArqueo));
            localStorage.setItem('primos_payroll', JSON.stringify(state.payroll));
            updatePointDisplay();
        }

        const formatCurrency = (amount) => {
            return new Intl.NumberFormat('es-CU', { style: 'currency', currency: 'CUP' }).format(amount);
        };

        const generateId = () => Math.random().toString(36).substr(2, 9);

        function switchTab(tabName) {
            if (!state.currentUser) return;

            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            const btn = document.querySelector(`button[data-tab="${tabName}"]`);
            if(btn) btn.classList.add('active');
            
            const titles = { 
                'pos': 'Punto de Venta', 
                'wholesale': 'Ventas x Mayor (Mayorista)',
                'inventory': 'Gestión de Inventario', 
                'withdrawals': 'Gestión de Extracciones', 
                'transfers': 'Registro de Transferencias',
                'expenses': 'Control de Gastos y Pérdidas',
                'history': 'Historial Completo', 
                'dashboard': 'Resumen y Cierre',
                'shifts': 'Reportes de Turnos Cerrados',
                'users': 'Gestión de Usuarios',
                'settings': 'Configuración del Punto',
                'counter': 'Contador de Efectivo',
                'charts': 'Gráficos y Estadísticas',
                'payroll': 'Nómina y Salarios'
            };
            document.getElementById('page-title').innerText = titles[tabName];
            
            const searchContainer = document.getElementById('search-container');
            if (tabName === 'pos' || tabName === 'wholesale') searchContainer.style.display = 'block';
            else searchContainer.style.display = 'none';

            if (tabName === 'pos') { activePOSMode = 'retail'; renderPOS(); }
            else if (tabName === 'wholesale') { activePOSMode = 'wholesale'; renderPOS(); }
            else if (tabName === 'inventory') renderInventory();
            else if (tabName === 'withdrawals') renderWithdrawals(); 
            else if (tabName === 'transfers') renderTransfers();
            else if (tabName === 'expenses') renderExpenses();
            else if (tabName === 'history') renderHistory();

        function addManualShift(userId) {
            const user = state.users.find(u => u.id === userId);
            if (!user) return;

            let amount = user.salaryConfig.base || 0;
            
            if (user.salaryConfig.type === 'percent' || user.salaryConfig.type === 'mixed') {
                const salesStr = prompt(`Ingrese ventas totales para calcular el ${user.salaryConfig.percent}% de comisión:`, "0");
                if (salesStr === null) return;
                const salesNum = parseFloat(salesStr) || 0;
                amount += (salesNum * user.salaryConfig.percent / 100);
            } else if (user.salaryConfig.type === 'fixed_action') {
                const qtyStr = prompt(`Ingrese cantidad de '${user.salaryConfig.actionName}' realizadas:`, "0");
                if (qtyStr === null) return;
                const qty = parseFloat(qtyStr) || 0;
                amount += (qty * user.salaryConfig.actionRate);
            }

            if (amount <= 0 && user.salaryConfig.type !== 'fixed_action') {
                const manual = prompt("No hay salario base ni comisión. Ingrese monto a pagar manualmente por la jornada:", "0");
                if (manual === null) return;
                amount = parseFloat(manual);
            }

            if (confirm(`¿Registrar jornada para ${user.name} por valor de ${formatCurrency(amount)}?`)) {
                state.payroll.push({
                    id: generateId(),
                    employeeId: user.id,
                    amount: amount,
                    date: new Date().toISOString(),
                    reason: 'Jornada Manual',
                    status: 'pending'
                });
                saveData();
                renderPayroll();
            }
        }

        function payEmployee(userId) {
            const user = state.users.find(u => u.id === userId);
            const pendingItems = state.payroll.filter(p => p.employeeId === userId && p.status === 'pending');
            const total = pendingItems.reduce((acc, p) => acc + p.amount, 0);

            if (confirm(`¿Confirmar pago de ${formatCurrency(total)} a ${user.name}?`)) {
                state.payroll = state.payroll.map(p => {
                    if (p.employeeId === userId && p.status === 'pending') {
                        return { ...p, status: 'paid', paidDate: new Date().toISOString() };
                    }
                    return p;
                });
                if(confirm("¿Desea registrar este pago como un GASTO en la caja actual?")) {
                    state.history.unshift({
                        id: generateId(),
                        type: 'expense',
                        date: new Date().toISOString(),
                        productName: `Pago Nómina: ${user.name}`,
                        amount: 1,
                        total: total,
                        user: state.currentUser.name,
                        point: state.settings.pointName
                    });
                }
                saveData();
                renderPayroll();
            }
        }

        function setCategory(cat) {
            state.selectedCategory = cat;

        function addToCart(id, askQty = false, mode = 'retail') {
            const product = state.inventory.find(p => p.id === id);
            if (!product || product.stock <= 0) return alert("Sin stock");
            
            const activeCart = mode === 'wholesale' ? state.wholesaleCart : state.cart;

            let qtyToAdd = 1;
            if (askQty) {
                const input = prompt(`Cantidad a vender de: ${product.name}`, "1");
                if (input === null) return;
                qtyToAdd = parseInt(input);
                if (isNaN(qtyToAdd) || qtyToAdd <= 0) return;
            }

            const existing = activeCart.find(c => c.id === id);
            const currentQtyInCart = existing ? existing.qty : 0;
            
            if (currentQtyInCart + qtyToAdd > product.stock) {
                alert(`Solo hay ${product.stock} unidades disponibles.`);
                return;
            }

            if (existing) {
                existing.qty += qtyToAdd;
            } else {
                activeCart.push({ ...product, qty: qtyToAdd });
            }
            renderPOS();
        }

        function promptQty(id, mode = 'retail') {
            const activeCart = mode === 'wholesale' ? state.wholesaleCart : state.cart;
            const item = activeCart.find(c => c.id === id);
            const product = state.inventory.find(p => p.id === id);
            const input = prompt(`Cambiar cantidad para ${item.name} (Max: ${product.stock})`, item.qty);
            if (input !== null) {
                const newQty = parseInt(input);
                if (!isNaN(newQty) && newQty > 0) {
                    if (newQty <= product.stock) {
                        item.qty = newQty;
                        renderPOS();
                    } else {
                        alert("Cantidad excede stock disponible");
                    }
                }
            }
        }

        function updateCartQty(id, change, mode = 'retail') {
            const activeCart = mode === 'wholesale' ? state.wholesaleCart : state.cart;
            const itemIndex = activeCart.findIndex(c => c.id === id);
            if (itemIndex === -1) return;
            
            const item = activeCart[itemIndex];
            const product = state.inventory.find(p => p.id === id);
            const newQty = item.qty + change;
            
            if (newQty > product.stock) return; 
            if (newQty <= 0) activeCart.splice(itemIndex, 1);
            else item.qty = newQty;
            renderPOS();
        }

        function clearCart(mode = 'retail') {

                if (item.category === 'x Mayor' && newUnits !== null) {

        function adjustStock(id, amount, type) {
            const item = state.inventory.find(i => i.id === id);
            if (item) {
                const qty = parseInt(amount) || 0;
                if (qty <= 0) return alert("Cantidad inválida");
                state.history.unshift({
                    id: generateId(),
                    type: type, 
                    date: new Date().toISOString(),
                    productName: item.name,
                    amount: qty,
                    total: 0,
                    user: state.currentUser.name,
                    point: state.settings.pointName 
                });

                if (type === 'add') item.stock += qty;
                if (type === 'loss') item.stock = Math.max(0, item.stock - qty);
                
                saveData();
                renderInventory();
                closeModal();
            }
        }

        function processImport(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedState = JSON.parse(e.target.result);
                    if(confirm("¿Desea importar el CATÁLOGO DE PRODUCTOS del archivo?\n\nNota: El historial de ventas NO se importará.")) {
                        let importedCount = 0;
                        if (importedState.inventory && Array.isArray(importedState.inventory)) {
                            const currentIds = new Set(state.inventory.map(i => i.id));
                            importedState.inventory.forEach(item => {
                                if (!currentIds.has(item.id)) {
                                    if(item.cost === undefined) item.cost = item.price * 0.7;
                                    state.inventory.push(item);
                                    importedCount++;
                                }
                            });
                        }
                        saveData();
                        alert(`Proceso finalizado.\n- Productos nuevos agregados: ${importedCount}`);
                        renderSettings();
                    }
                } catch (err) {
                    alert("Error al leer el archivo. Asegúrese de que sea un backup válido.");
                    console.error(err);
                }
            };
            reader.readAsText(file);
            input.value = ''; 
        }

                                    let detail = '';

                                        detail = `-${record.amount} ${record.productName}`;

                                        detail = record.productName || 'Retiro de efectivo';
                                        amountClass = 'color:var(--color-danger); font-weight:bold;';

                                        typeBadge = `<span class="badge badge-expense">Gasto</span>`;

                                    `

                        </table>

        function revertSale(saleId) {
            if (!confirm("¿CONFIRMAR REVERSIÓN DE VENTA?\n\n- Se devolverán los productos al inventario.\n- Se eliminará este registro del historial.\n- Esta acción es irreversible.")) {
                return;
            }

            const saleIndex = state.history.findIndex(h => h.id === saleId);
            if (saleIndex === -1) return alert("Venta no encontrada.");

            const saleRecord = state.history[saleIndex];

            if (saleRecord.items && Array.isArray(saleRecord.items)) {
                saleRecord.items.forEach(item => {
                    const productInInventory = state.inventory.find(p => p.id === item.id);
                    if (productInInventory) {
                        productInInventory.stock += item.qty;
                    }
                });
            }

            state.history.splice(saleIndex, 1);
            saveData();
            if(document.getElementById('page-title').innerText.includes('Transferencias')) renderTransfers();
            else renderHistory();
            renderDashboard(); 
            alert("Venta revertida exitosamente. El stock ha sido restaurado.");
        }

        function clearHistory() {
            if (state.currentUser.role !== 'admin') return;
            
            if (confirm("⚠️ ATENCIÓN ⚠️\n\n¿Está seguro de que desea BORRAR TODO EL HISTORIAL?\n\nEsta acción eliminará permanentemente todos los registros de ventas, entradas y mermas de TODAS las sedes.\n\nNo se puede deshacer.")) {
                if(confirm("Confirme nuevamente: ¿Borrar definitivamente todo el historial?")) {
                    state.history = [];
                    saveData();
                    renderHistory();
                    renderDashboard();
                    alert("Historial eliminado correctamente.");
                }
            }
        }

        function renderShiftDetails(shiftId) {

                            <div><strong>Efectivo Esperado (Sistema):</strong> ${formatCurrency(shift.cashSales)}</div>

        function updateBillCount(denom, val) {
            const count = parseInt(val) || 0;
            state.billCounts[denom] = count;
            
            const card = document.getElementById(`card-${denom}`);
            const subDisplay = document.getElementById(`subtotal-${denom}`);
            
            if (count > 0) {
                card.classList.add('active-count');
                subDisplay.innerText = formatCurrency(count * denom);
            } else {
                card.classList.remove('active-count');
                subDisplay.innerText = '-';
            }
            
            let total = 0;
            DENOMINACIONES_CUP.forEach(d => {
                total += (state.billCounts[d] || 0) * d;
            });
            document.getElementById('counter-total-display').innerText = formatCurrency(total);
        }

        function renderDashboard() {
            const isAdmin = state.currentUser.role === 'admin';
            const uniquePoints = [...new Set(state.history.map(h => h.point || 'Desconocido'))];

            let dataToAnalyze = state.history;

            if (isAdmin) {
                if (state.filterPoint !== 'All') {
                    dataToAnalyze = dataToAnalyze.filter(h => h.point === state.filterPoint);
                }
            } else {
                dataToAnalyze = dataToAnalyze.filter(h => h.user === state.currentUser.name && h.point === state.settings.pointName);
            }

            // Separación de Ventas Minoristas vs Mayoristas
            const retailSales = dataToAnalyze.filter(h => h.type === 'sale');
            const wholesaleSales = dataToAnalyze.filter(h => h.type === 'sale_wholesale');

            const cashSales = retailSales.filter(h => !h.method || h.method === 'cash').reduce((acc, c) => acc + c.total, 0);
            const transferSales = retailSales.filter(h => h.method === 'transfer').reduce((acc, c) => acc + c.total, 0);
            const totalRetailSales = cashSales + transferSales;
            
            const totalWholesaleSales = wholesaleSales.reduce((acc, c) => acc + c.total, 0);

            // Costos y Beneficios Consolidados
            const totalRetailCost = retailSales.reduce((acc, c) => acc + (c.totalCost || c.total * 0.7), 0);
            const totalWholesaleCost = wholesaleSales.reduce((acc, c) => acc + (c.totalCost || c.total * 0.7), 0);
            
            const totalExpenses = dataToAnalyze.filter(h => h.type === 'expense').reduce((acc, e) => acc + e.total, 0);
            
            // Ganancia Neta global (Minorista + Mayorista) - Gastos
            const netProfit = (totalRetailSales - totalRetailCost) + (totalWholesaleSales - totalWholesaleCost) - totalExpenses;

            const invValue = state.inventory.reduce((acc, curr) => acc + (curr.stock * (curr.cost || 0)), 0);
            
            const currentSessionWithdrawals = state.history.filter(h => 
                h.type === 'withdrawal' && 
                h.user === state.currentUser.name && 
                h.point === state.settings.pointName
            );
            const totalWithdrawals = currentSessionWithdrawals.reduce((sum, w) => sum + w.total, 0);
            
            const currentSessionExpenses = state.history.filter(h => 
                h.type === 'expense' && 
                h.user === state.currentUser.name &&

            );

                            📄 Descargar Reporte PDF
                        </button>
                    </div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon" style="background:#dcfce7; color:#166534;"><svg class="icon" viewBox="0 0 24 24"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
                        <div class="stat-value" id="sys-cash">${formatCurrency(cashSales)}</div>
                        <div class="stat-label">Ventas en Efectivo (Caja)</div>
                    </div>

                    <div class="stat-card">

                        <div class="stat-value">${formatCurrency(transferSales)}</div>

                    ${isAdmin ? `

                            <div class="stat-value">${formatCurrency(netProfit)}</div>
                            <div class="stat-label">Utilidad Neta (General)</div>
                        </div>
                    ` : ''}
                    
                    ${isAdmin ? `
                    <div class="stat-card">
                        <div class="stat-icon" style="background:#dbeafe; color:#1e40af;"><svg class="icon" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></div>

                        <div class="stat-icon" style="background:#fee2e2; color:#991b1b;"><svg class="icon" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg></div>
                        <div class="stat-value">${formatCurrency(totalExpenses)}</div>
                        <div class="stat-label">Total Gastos/Pérdidas</div>
                    </div>
                </div>

                ${!isAdmin ? `
                    <div class="arqueo-box">

                                    value="${state.tempArqueo.realCash || ''}"
                                    oninput="updateArqueoInput('realCash', this.value, ${cashSales})">
                            </div>

                        <span style="color:#f97316;">⚠</span> Alertas de Stock Bajo
                    </h4>
                    ${state.inventory.filter(i => i.stock < 10).map(i => `
                        <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #f1f5f9;">
                            <span>${i.name}</span>

                        </div>
                    `).join('')}
                    ${state.inventory.filter(i => i.stock < 10).length === 0 ? '<p style="color:#94a3b8;">Todo el inventario está saludable.</p>' : ''}
                </div>
            `;
            document.getElementById('app-content').innerHTML = html;

            if (!isAdmin) {
                calcArqueo(cashSales, totalWithdrawals + totalSessionExpenses);
            }
        }

        function updateArqueoInput(field, val, systemSales) {
            state.tempArqueo[field] = val; 
            saveData();
            
            const currentWithdrawals = state.history.filter(h => 
                h.type === 'withdrawal' && 
                h.user === state.currentUser.name && 
                h.point === state.settings.pointName
            );
            const totalWithdrawn = currentWithdrawals.reduce((sum, w) => sum + w.total, 0);

            const currentExpenses = state.history.filter(h => 
                h.type === 'expense' && 
                h.user === state.currentUser.name && 
                h.point === state.settings.pointName
            );
            const totalExpenses = currentExpenses.reduce((sum, e) => sum + e.total, 0);
            
            calcArqueo(systemSales, totalWithdrawn + totalExpenses);
        }

        function calcArqueo(systemSales, withdrawalTotal = 0) {
            if (withdrawalTotal === undefined || withdrawalTotal === 0) {
                 const currentWithdrawals = state.history.filter(h => h.type === 'withdrawal' && h.user === state.currentUser.name && h.point === state.settings.pointName);
                const currentExpenses = state.history.filter(h => h.type === 'expense' && h.user === state.currentUser.name && h.point === state.settings.pointName);
                withdrawalTotal = currentWithdrawals.reduce((sum, w) => sum + w.total, 0) + currentExpenses.reduce((sum, e) => sum + e.total, 0);
            }

            const realCash = parseFloat(document.getElementById('cash-real')?.value || state.tempArqueo.realCash) || 0;
            const container = document.getElementById('arqueo-result-container');

            if (!container) return;

            const expectedCash = systemSales - withdrawalTotal;
            const diff = realCash - expectedCash;

            let statusClass = 'arqueo-ok';
            let statusText = 'Cuadre Perfecto';
            let sign = '';

            if (diff < -0.5) { 
                statusClass = 'arqueo-warn';
                statusText = 'FALTANTE (Dinero perdido)';
                sign = '';
            } else if (diff > 0.5) {
                statusClass = 'arqueo-surplus';
                statusText = 'EXCEDENTE (Sobra dinero)';
                sign = '+';
            }

            container.innerHTML = `
                <div style="font-size:0.9rem; margin-bottom:5px; color:#64748b;">Debería haber: ${formatCurrency(expectedCash)}</div>
                <div class="arqueo-result ${statusClass}">
                    <span>${statusText}</span>
                    <span>${sign}${formatCurrency(diff)}</span>
                </div>
            `;
        }

        function closeShift() {
            const realCashInput = document.getElementById('cash-real');
            const realCashValue = realCashInput ? realCashInput.value : state.tempArqueo.realCash;
            
            if (realCashValue === '' || parseFloat(realCashValue) < 0) {
                return alert("Por favor, ingrese el 'Efectivo Real' contado antes de cerrar.");
            }

            if (confirm(`¿CONFIRMAR CIERRE DE TURNO?`)) {
                
                const sessionHistory = state.history.filter(h => h.user === state.currentUser.name && h.point === state.settings.pointName);
                
                const retailSalesArr = sessionHistory.filter(h => h.type === 'sale');
                const wholesaleSalesArr = sessionHistory.filter(h => h.type === 'sale_wholesale');

                const cashSales = retailSalesArr.filter(h => (!h.method || h.method === 'cash')).reduce((acc, c) => acc + c.total, 0);
                const transferSales = retailSalesArr.filter(h => h.method === 'transfer').reduce((acc, c) => acc + c.total, 0);
                const totalSales = cashSales + transferSales; // Ventas retail
                
                const totalWholesale = wholesaleSalesArr.reduce((acc, c) => acc + c.total, 0);

                const totalWithdrawals = sessionHistory.filter(h => h.type === 'withdrawal').reduce((acc, w) => acc + w.total, 0);
                const totalExpenses = sessionHistory.filter(h => h.type === 'expense').reduce((acc, e) => acc + e.total, 0);
                
                // Profit conjunto
                const retailProfit = retailSalesArr.reduce((acc, c) => acc + (c.profit || 0), 0);
                const wholesaleProfit = wholesaleSalesArr.reduce((acc, c) => acc + (c.profit || 0), 0);
                const totalProfit = retailProfit + wholesaleProfit;
                
                const realCash = parseFloat(realCashValue) || 0;
                const expectedCash = cashSales - (totalWithdrawals + totalExpenses); // X Mayor no afecta aquí
                
                const shiftReport = {
                    id: generateId(),
                    date: new Date().toISOString(),
                    user: state.currentUser.name,
                    point: state.settings.pointName,
                    totalSales, // Solo retail
                    totalWholesale, // Almacenado separadamente
                    totalProfit, 
                    cashSales, 
                    transferSales,
                    withdrawal: totalWithdrawals, 
                    expenses: totalExpenses, 
                    realCash,
                    cashDiff: realCash - expectedCash,
                    transactions: sessionHistory
                };

                // CALCULAR SALARIO DEL TRABAJADOR
                const user = state.currentUser;
                let payAmount = user.salaryConfig.base || 0; 
                
                if (user.salaryConfig.type === 'percent' || user.salaryConfig.type === 'mixed') {
                    const ventasComisionables = totalSales + totalWholesale;
                    payAmount += (ventasComisionables * (user.salaryConfig.percent || 0) / 100);
                } else if (user.salaryConfig.type === 'fixed_action') {
                    const qtyStr = prompt(`Para calcular tu salario: ¿Cuántas '${user.salaryConfig.actionName}' realizaste en este turno?`, "0");
                    const qty = parseFloat(qtyStr) || 0;
                    payAmount += (qty * (user.salaryConfig.actionRate || 0));
                }

                // Registrar pago pendiente en nómina
                if (payAmount > 0) {
                    state.payroll.push({
                        id: generateId(),
                        employeeId: user.id,
                        amount: payAmount,
                        date: new Date().toISOString(),
                        reason: 'Turno Completado',
                        status: 'pending'
                    });
                }

                if(!state.shifts) state.shifts = [];
                state.shifts.unshift(shiftReport);

                state.history = state.history.filter(h => !(h.user === state.currentUser.name && h.point === state.settings.pointName));
                state.cart = [];
                state.wholesaleCart = [];
                state.tempArqueo = { withdrawal: '', realCash: '' };
                
                saveData();
                renderDashboard();
                alert(`Turno cerrado. Salario generado para nómina: ${formatCurrency(payAmount)}`);
                logout(); 
            }
        }
