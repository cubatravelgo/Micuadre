        function renderCharts() {
            const isAdmin = state.currentUser.role === 'admin';
            const shiftHistory = state.shifts ? state.shifts.flatMap(s => s.transactions) : [];
            let allHistory = [...state.history, ...shiftHistory]; 

            if (!isAdmin) {
                allHistory = allHistory.filter(h => h.user === state.currentUser.name && h.point === state.settings.pointName);
            }

            const productSales = {};
            
            allHistory.forEach(record => {
                if ((record.type === 'sale' || record.type === 'sale_wholesale') && record.items) {
                    record.items.forEach(item => {
                        productSales[item.name] = (productSales[item.name] || 0) + item.qty;
                    });
                }
            });

            const sortedProducts = Object.entries(productSales)
                .sort((a, b) => b[1] - a[1])
                .slice(0, 5); 

            const topProductsLabels = sortedProducts.map(p => p[0]);
            const topProductsData = sortedProducts.map(p => p[1]);

            const last7Days = {};
            const today = new Date();
            for (let i = 6; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                last7Days[date.toLocaleDateString()] = { sales: 0, profit: 0 };
            }

            allHistory.forEach(record => {
                if (record.type === 'sale' || record.type === 'sale_wholesale') {
                    const recordDate = new Date(record.date).toLocaleDateString();
                    if (last7Days[recordDate]) {
                        last7Days[recordDate].sales += record.total;
                        last7Days[recordDate].profit += (record.profit || 0); 
                    }
                }
            });

            const weeklyLabels = Object.keys(last7Days);
            const weeklySalesData = Object.values(last7Days).map(d => d.sales);
            const weeklyProfitData = Object.values(last7Days).map(d => d.profit);

            const categorySales = {};
            allHistory.forEach(record => {
                if ((record.type === 'sale' || record.type === 'sale_wholesale') && record.items) {
                    record.items.forEach(item => {
                        const cat = item.category || 'Otros';
                        categorySales[cat] = (categorySales[cat] || 0) + (item.price * item.qty);
                    });
                }
            });
            const catLabels = Object.keys(categorySales);
            const catData = Object.values(categorySales);


            let html = `
                <div style="margin-bottom: 20px;">
                    <h3 style="font-weight:bold;">${isAdmin ? 'Estadísticas Globales' : 'Mis Estadísticas'}</h3>
                    <p style="font-size:0.85rem; color:#64748b;">Análisis de rendimiento de los últimos 7 días.</p>
                </div>
                <div class="charts-grid">
                    <div class="stat-card chart-container">
                        <canvas id="topProductsChart"></canvas>
                    </div>
                    <div class="stat-card chart-container">
                        <canvas id="weeklyChart"></canvas>
                    </div>
                    <div class="stat-card chart-container">
                        <canvas id="categoryChart"></canvas>
                    </div>
                </div>
            `;
            document.getElementById('app-content').innerHTML = html;

            new Chart(document.getElementById('topProductsChart'), {
                type: 'bar',
                data: {
                    labels: topProductsLabels,
                    datasets: [{
                        label: 'Unidades Vendidas',
                        data: topProductsData,
                        backgroundColor: 'rgba(236, 72, 153, 0.6)',
                        borderColor: 'rgba(236, 72, 153, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { title: { display: true, text: 'Top 5 Productos Más Vendidos' } }
                }
            });

            const weeklyDatasets = [
                {
                    label: 'Ventas ($)',
                    data: weeklySalesData,
                    borderColor: '#3b82f6',
                    tension: 0.1
                }
            ];

            if (isAdmin) {
                weeklyDatasets.push({
                    label: 'Ganancias ($)',
                    data: weeklyProfitData,
                    borderColor: '#22c55e',
                    tension: 0.1
                });
            }

            new Chart(document.getElementById('weeklyChart'), {
                type: 'line',
                data: {
                    labels: weeklyLabels,
                    datasets: weeklyDatasets
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { title: { display: true, text: isAdmin ? 'Ventas y Ganancias (7 Días)' : 'Mis Ventas (7 Días)' } }
                }
            });

            new Chart(document.getElementById('categoryChart'), {
                type: 'doughnut',
                data: {
                    labels: catLabels,
                    datasets: [{
                        data: catData,
                        backgroundColor: [
                            '#ec4899', '#3b82f6', '#22c55e', '#f59e0b', '#ef4444', '#8b5cf6', '#64748b'
                        ]
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { title: { display: true, text: 'Ventas por Categoría ($)' } }
                }
            });
        }

        init();
    </script>
</body>
</html>
